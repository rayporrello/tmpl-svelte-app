# Copy this file to `secrets.yaml`, fill in real values, then encrypt with:
#   sops --encrypt --in-place secrets.yaml
#
# Do not commit plaintext `secrets.yaml`.
# Edit an already-encrypted secrets.yaml with: sops secrets.yaml
#
# ORIGIN is required by SvelteKit in production. Set it to the canonical site URL.
ORIGIN: https://example.com

# Postgres connection string. Required — the app will not start without it.
# With the bundled Postgres Quadlet, containers use the project network host.
DATABASE_URL: postgres://site_user:replace-me@<project>-postgres:5432/site_db

# Host-side URL for migrations, backups, and restores. With the bundled
# Postgres Quadlet, this points at its loopback-only published port.
DATABASE_DIRECT_URL: postgres://site_user:replace-me@127.0.0.1:5432/site_db

# Bundled Postgres container initialization. Leave aligned with DATABASE_URL.
POSTGRES_DB: site_db
POSTGRES_USER: site_user
POSTGRES_PASSWORD: replace-me

# Email addresses for contact form routing (used by the contact form at /contact).
# The form saves submissions to DB even if these are not set.
CONTACT_TO_EMAIL: hello@example.com
CONTACT_FROM_EMAIL: website@example.com

# Transactional email provider (optional — form saves to DB without it).
# Postmark: set this token to enable real email delivery via Postmark.
POSTMARK_SERVER_TOKEN: replace-me

# Session signing secret. Must be a long, random string. Generate with:
#   openssl rand -base64 48
SESSION_SECRET: replace-me-with-a-long-random-string

# Automation provider — n8n is the default. Production preflight FAILS if
# AUTOMATION_PROVIDER is n8n (or unset) and the n8n config below is empty;
# explicit `noop` is allowed for sites with no automation. See
# docs/automations/README.md and docs/automations/n8n-workflow-contract.md.
AUTOMATION_PROVIDER: n8n

# n8n — required when AUTOMATION_PROVIDER=n8n.
N8N_WEBHOOK_URL: 'https://n8n.example.com/webhook/<this-site>'
N8N_WEBHOOK_SECRET: replace-me-with-a-long-random-string

# Auth mode: `header` (default; matches n8n's Header Auth credential) or
# `hmac` (stronger; receiver needs a Code node to verify).
N8N_WEBHOOK_AUTH_MODE: header
# Header name used in `header` mode. Match this in the n8n Header Auth credential.
N8N_WEBHOOK_AUTH_HEADER: X-Site-Auth

# Generic webhook escape hatch — only when AUTOMATION_PROVIDER=webhook.
AUTOMATION_WEBHOOK_URL: ''
AUTOMATION_WEBHOOK_SECRET: ''
AUTOMATION_WEBHOOK_AUTH_MODE: header
AUTOMATION_WEBHOOK_AUTH_HEADER: X-Site-Auth

# Backups (optional — set both to enable nightly off-host sync).
# rclone remote spec, e.g. r2:bucket/site-backups. Configure once with: rclone config
# Healthchecks.io ping URL (or compatible). See docs/operations/backups.md.
BACKUP_REMOTE: ''
BACKUP_HEALTHCHECK_URL: ''
