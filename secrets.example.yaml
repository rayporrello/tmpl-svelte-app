# Copy this file to `secrets.yaml`, fill in real values, then encrypt with:
#   sops --encrypt --in-place secrets.yaml
#
# Do not commit plaintext `secrets.yaml`.
# Edit an already-encrypted secrets.yaml with: sops secrets.yaml
#
# This website repo keeps only development examples. Production secrets live in
# platform-infrastructure/secrets.yaml and are rendered from there.

ORIGIN: https://example.com
PUBLIC_SITE_URL: https://example.com
CLIENT_SLUG: example-client
DATABASE_URL: postgres://example_client_app_user:replace-me@web-platform-postgres:5432/example_client_app
DATABASE_POOL_MAX: '5'
DATABASE_STATEMENT_TIMEOUT_MS: '5000'

# Email addresses for contact form routing (used by the contact form at /contact).
# Required in production with Postmark by ADR-024.
CONTACT_TO_EMAIL: hello@example.com
CONTACT_FROM_EMAIL: website@example.com

# Transactional email provider. Optional in local/dev/test; required for
# production lead notification unless LAUNCH_ALLOW_CONSOLE_EMAIL=1 is set.
POSTMARK_SERVER_TOKEN: replace-me

# Authenticated E2E deploy smoke (ADR-029). SMOKE_TEST_SECRET is a privileged
# backdoor credential; generate with `openssl rand -hex 32` and rotate per
# docs/operations/smoke.md. POSTMARK_API_TEST is required when smoke is enabled.
SMOKE_TEST_SECRET: '0123456789abcdef0123456789abcdef'
POSTMARK_API_TEST: POSTMARK_API_TEST
SMOKE_TEST_RATE_LIMIT_PER_HOUR: '60'
SMOKE_TEST_BACKLOG_THRESHOLD: '100'

# Caddy basicauth hash for /admin/*, generated with `caddy hash-password`.
# Store only the hash; the cleartext password is never written to repo files.
HEALTH_ADMIN_PASSWORD_HASH: '$2a$14$abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXY12'

# Explicit production waiver for non-lead-gen variants or temporary repair mode.
# Not a normal launch path.
LAUNCH_ALLOW_CONSOLE_EMAIL: '0'

# Session signing secret. Must be a long, random string. Generate with:
#   openssl rand -base64 48
SESSION_SECRET: replace-me-with-a-long-random-string

# Local-dev automation provider settings for `bun run automation:worker`.
# Production provider settings are platform-owned.
AUTOMATION_PROVIDER: noop

# External n8n endpoint — optional; required only when AUTOMATION_PROVIDER=n8n.
# Point this at n8n.cloud or a separately hosted n8n instance. n8n is not
# bundled with this website appliance.
N8N_WEBHOOK_URL: 'https://n8n.example.com/webhook/<this-site>'
N8N_WEBHOOK_SECRET: replace-me-with-a-long-random-string

# Auth mode: `header` (default; matches n8n's Header Auth credential) or
# `hmac` (stronger; receiver needs a Code node to verify).
N8N_WEBHOOK_AUTH_MODE: header
# Header name used in `header` mode. Match this in the n8n Header Auth credential.
N8N_WEBHOOK_AUTH_HEADER: X-Site-Auth

# Generic webhook escape hatch — only when AUTOMATION_PROVIDER=webhook.
AUTOMATION_WEBHOOK_URL: ''
AUTOMATION_WEBHOOK_SECRET: ''
AUTOMATION_WEBHOOK_AUTH_MODE: header
AUTOMATION_WEBHOOK_AUTH_HEADER: X-Site-Auth
