pre-commit:
  commands:
    format:
      glob: '*.{js,ts,svelte,css,json,md,yaml,yml}'
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{js,ts,svelte}'
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    design-system:
      glob: '*.{ts,svelte,css,html}'
      run: bun run scripts/check-design-system.ts --changed {staged_files}
