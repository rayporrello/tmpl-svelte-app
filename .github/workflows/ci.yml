# CI — three jobs: validate (PR + push), image (push to main + tag), launch (tag only)
#
# Trivy gates on CRITICAL only initially; HIGH is reported but non-blocking.
# Tighten to HIGH after 3 successful releases without false positives (ADR-018).

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write # required for GHCR push in the image job

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# ── validate ──────────────────────────────────────────────────────────────────
# Runs on every PR and every push. Installs deps and runs bun run validate.
# Uploads the production build as an artifact for potential downstream use.

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_PORT: 45139
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Reads bun version from packageManager field in package.json
          bun-version-file: package.json

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run validate
        run: bun run validate
        env:
          # Stub values so prerendering and env validation pass without real secrets.
          # check:launch is the gate for placeholder URLs.
          # DATABASE_URL stub: lets initEnv() pass; no DB queries run during validate.
          ORIGIN: https://example.com
          PUBLIC_SITE_URL: https://example.com
          DATABASE_URL: postgres://ci_stub:ci_stub@127.0.0.1:5432/ci_stub

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 7

  init-site-acceptance:
    name: init:site acceptance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="HEAD^"
            fi
          fi

          SHOULD_RUN=false
          while IFS= read -r file; do
            case "$file" in
              scripts/init-site.ts|\
              scripts/check-init-site.ts|\
              scripts/check-launch.ts|\
              scripts/check-assets.ts|\
              package.json|\
              src/lib/config/site.ts|\
              static/admin/config.yml|\
              static/site.webmanifest|\
              README.md|\
              .env.example|\
              deploy/env.example|\
              deploy/Caddyfile.example|\
              deploy/quadlets/web.container|\
              deploy/quadlets/web.network)
                SHOULD_RUN=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: steps.changes.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run check:init-site
        if: steps.changes.outputs.should_run == 'true'
        run: bun run check:init-site

      - name: Skip check:init-site
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No init:site acceptance paths changed."

  # ── image ─────────────────────────────────────────────────────────────────────
  # Runs on push to main and tag pushes. Requires validate to pass.
  # Build → Trivy CRITICAL scan → Trivy HIGH report → smoke /healthz → push to GHCR.

  image:
    name: Build + Scan + Smoke + Push
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        id: short
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into daemon for scan + smoke)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.short.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: CRITICAL — blocks the run ──────────────────────────────────
      - name: Trivy scan — CRITICAL (blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      # ── Trivy: HIGH — reports only, non-blocking ───────────────────────────
      - name: Trivy scan — HIGH (reporting only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH
        continue-on-error: true

      # ── Build-then-run smoke: start container, poll /healthz up to 30s ────
      - name: Smoke test — /healthz returns 200
        run: |
          docker run --rm -d \
            -p 127.0.0.1:45139:3000 \
            -e ORIGIN=http://127.0.0.1:45139 \
            -e PUBLIC_SITE_URL=http://127.0.0.1:45139 \
            -e DATABASE_URL=postgres://ci_stub:ci_stub@127.0.0.1:5432/ci_stub \
            --name smoke \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "Polling /healthz..."
          for i in $(seq 30); do
            if curl -fsS http://127.0.0.1:45139/healthz; then
              echo ""
              echo "✓ Smoke passed (attempt $i)"
              docker stop smoke
              exit 0
            fi
            sleep 1
          done

          echo "✗ /healthz did not return 200 within 30s"
          docker logs smoke
          docker stop smoke || true
          exit 1

      - name: Push image to GHCR
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}:${{ steps.short.outputs.sha }}"

  # ── launch ────────────────────────────────────────────────────────────────────
  # Runs only on tag pushes. Verifies no placeholder values remain.
  # Expected to fail on a fresh template clone until bun run init:site is run (Batch B).

  launch:
    name: Launch validation
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validate:launch
        run: bun run validate:launch
        env:
          # Stubs so env validation passes; check:launch reports structural errors.
          ORIGIN: ${{ vars.PRODUCTION_ORIGIN || 'https://example.com' }}
          PUBLIC_SITE_URL: ${{ vars.PRODUCTION_ORIGIN || 'https://example.com' }}
          DATABASE_URL: postgres://ci_stub:ci_stub@127.0.0.1:5432/ci_stub
