# CI — validate, bootstrap-smoke, init-site acceptance, image, and launch gates.
#
# Trivy gates on CRITICAL only initially; HIGH is reported but non-blocking.
# Flip target: at the v1.0.0 tag, switch the HIGH steps to exit-code: '1' and
# drop continue-on-error so HIGH gates the run. Same for `bun audit`. Until
# then, treat both as advisory and watch the run output. ADR-018.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write # required for GHCR push in the image job

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# ── validate ──────────────────────────────────────────────────────────────────
# Runs on every PR and every push. Installs deps and runs bun run validate:ci.
# Uploads the production build as an artifact for potential downstream use.

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_PORT: 45139
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Reads bun version from packageManager field in package.json
          bun-version-file: package.json

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # bun audit reports advisories from the npm registry against bun.lock.
      # Advisory-only until v1.0.0 tag; flip to gating then by removing
      # continue-on-error and (if needed) failing on bun audit's exit code.
      - name: bun audit (advisory until v1.0.0)
        run: bun audit
        continue-on-error: true

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run validate:ci
        run: bun run validate:ci
        env:
          # Stub values so prerendering and env validation pass without real secrets.
          # check:launch is the gate for placeholder URLs.
          # DATABASE_URL stub: lets initEnv() pass; no DB queries run during validate.
          ORIGIN: https://example.com
          PUBLIC_SITE_URL: https://example.com
          DATABASE_URL: postgres://ci_stub:ci_stub@127.0.0.1:5432/ci_stub

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 7

  bootstrap-smoke:
    name: Bootstrap smoke (real Postgres)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: tmpl_smoke_user
          POSTGRES_PASSWORD: tmpl_smoke_pw
          POSTGRES_DB: tmpl_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tmpl_smoke_user -d tmpl_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      # Action SHAs match the existing pinning style in this workflow.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run ./bootstrap --ci against the service Postgres
        env:
          DATABASE_URL: postgres://tmpl_smoke_user:tmpl_smoke_pw@127.0.0.1:5432/tmpl_smoke
          BOOTSTRAP_PACKAGE_NAME: tmpl-bootstrap-smoke
          BOOTSTRAP_SITE_NAME: Bootstrap Smoke
          BOOTSTRAP_PRODUCTION_URL: https://bootstrap-smoke.example.com
          BOOTSTRAP_META_DESCRIPTION: Bootstrap smoke description.
          BOOTSTRAP_GITHUB_OWNER: bootstrap-smoke
          BOOTSTRAP_GITHUB_REPO: tmpl-bootstrap-smoke
          BOOTSTRAP_SUPPORT_EMAIL: hello@bootstrap-smoke.example.com
          BOOTSTRAP_PROJECT_SLUG: tmpl-bootstrap-smoke
          BOOTSTRAP_PRODUCTION_DOMAIN: bootstrap-smoke.example.com
          BOOTSTRAP_PWA_SHORT_NAME: Smoke
        run: ./bootstrap --ci

      - name: Build production bundle
        run: bun run build

      - name: Start built server
        env:
          DATABASE_URL: postgres://tmpl_smoke_user:tmpl_smoke_pw@127.0.0.1:5432/tmpl_smoke
          ORIGIN: http://127.0.0.1:3000
          PUBLIC_SITE_URL: http://127.0.0.1:3000
          PORT: 3000
        run: bun run serve.js &

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/healthz && exit 0
            sleep 1
          done
          exit 1

      - name: Check /readyz
        run: curl -sf http://127.0.0.1:3000/readyz

      - name: Run validate:core
        run: bun run validate:core

  init-site-acceptance:
    name: init:site acceptance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="HEAD^"
            fi
          fi

          SHOULD_RUN=false
          while IFS= read -r file; do
            case "$file" in
              scripts/init-site.ts|\
              scripts/check-project.ts|\
              scripts/check-init-site.ts|\
              scripts/check-launch.ts|\
              scripts/check-assets.ts|\
              scripts/lib/site-project.ts|\
              site.project.json|\
              package.json|\
              src/app.html|\
              src/lib/config/site.ts|\
              static/admin/config.yml|\
              static/site.webmanifest|\
              README.md|\
              .env.example|\
              deploy/env.example|\
              deploy/Caddyfile.example|\
              deploy/Containerfile.postgres|\
              deploy/quadlets/web.container|\
              deploy/quadlets/web.network|\
              deploy/quadlets/postgres.container|\
              deploy/quadlets/postgres.volume|\
              deploy/quadlets/worker.container|\
              deploy/systemd/backup.service|\
              deploy/systemd/backup.timer|\
              deploy/systemd/backup-base.service|\
              deploy/systemd/backup-base.timer|\
              deploy/systemd/backup-check.service|\
              deploy/systemd/backup-check.timer)
                SHOULD_RUN=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: steps.changes.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run check:init-site
        if: steps.changes.outputs.should_run == 'true'
        run: bun run check:init-site

      - name: Skip check:init-site
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No init:site acceptance paths changed."

  # ── image ─────────────────────────────────────────────────────────────────────
  # Runs on push to main and tag pushes. Requires validate to pass.
  # Build → Trivy CRITICAL scan → Trivy HIGH report → smoke /healthz → push to GHCR.

  image:
    name: Build + Scan + Smoke + Push
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        id: short
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into daemon for scan + smoke)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.short.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: CRITICAL — blocks the run ──────────────────────────────────
      # .trivyignore stays present even when empty so CI has a stable ignore file.
      - name: Trivy scan — CRITICAL (blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL
          trivyignores: .trivyignore

      # ── Trivy: HIGH — reports only, non-blocking until v1.0.0 ──────────────
      # At the v1.0.0 tag, change exit-code: '0' → '1' and remove
      # continue-on-error to gate on HIGH alongside CRITICAL.
      - name: Trivy scan — HIGH (reporting only until v1.0.0)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH
          trivyignores: .trivyignore
        continue-on-error: true

      # ── Build-then-run smoke: start container, poll /healthz up to 30s ────
      # The DATABASE_URL hostname is a non-loopback stub so the container's
      # IN_CONTAINER guard in src/lib/server/env.ts passes. /healthz does not
      # query the DB, so the URL never has to be reachable here.
      - name: Smoke test — /healthz returns 200
        run: |
          docker run --rm -d \
            -p 127.0.0.1:45139:3000 \
            -e ORIGIN=http://127.0.0.1:45139 \
            -e PUBLIC_SITE_URL=http://127.0.0.1:45139 \
            -e DATABASE_URL=postgres://ci_stub:ci_stub@stub-db:5432/ci_stub \
            --name smoke \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "Polling /healthz..."
          for i in $(seq 30); do
            if curl -fsS http://127.0.0.1:45139/healthz; then
              echo ""
              echo "✓ Smoke passed (attempt $i)"
              docker stop smoke
              exit 0
            fi
            sleep 1
          done

          echo "✗ /healthz did not return 200 within 30s"
          docker logs smoke
          docker stop smoke || true
          exit 1

      - name: Push image to GHCR
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}:${{ steps.short.outputs.sha }}"

  # ── postgres image ────────────────────────────────────────────────────────────
  # Builds the per-project Postgres+WAL-G image from deploy/Containerfile.postgres.
  # Tagged ghcr.io/<owner>/<repo>-postgres:<sha>; the Quadlet at
  # deploy/quadlets/postgres.container references it by SHA. Trivy CRITICAL
  # gates here too; if WAL-G or the upstream Postgres base ever ship a
  # CRITICAL CVE, the deploy is blocked.

  postgres-image:
    name: Build + Scan + Push (postgres)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set short SHA
        id: short
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build postgres image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Containerfile.postgres
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}-postgres:${{ github.sha }}
            ${{ env.IMAGE_NAME }}-postgres:${{ steps.short.outputs.sha }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      - name: Trivy scan — CRITICAL (blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}-postgres:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL
          trivyignores: .trivyignore

      - name: Trivy scan — HIGH (reporting only until v1.0.0)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}-postgres:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH
          trivyignores: .trivyignore
        continue-on-error: true

      - name: WAL-G version smoke
        run: |
          docker run --rm \
            "${{ env.IMAGE_NAME }}-postgres:${{ github.sha }}" \
            wal-g --version

      - name: Push postgres image to GHCR
        run: |
          docker push "${{ env.IMAGE_NAME }}-postgres:${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}-postgres:${{ steps.short.outputs.sha }}"

  # ── launch ────────────────────────────────────────────────────────────────────
  # Runs only on tag pushes. Verifies no placeholder values remain.
  # Auto-skips on the template repo itself (placeholders intact in site.ts).
  # Run `bun run init:site` in a project clone before tagging that project's
  # release for validate:launch to exercise.

  launch:
    name: Launch validation
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect template state
        id: state
        run: |
          if grep -qE "name: 'Your Site Name'|url: 'https://example.com'" src/lib/config/site.ts; then
            echo "::notice::Tag is on the template repo (site.ts placeholders are still present). Launch validation only runs on project tags after \`bun run init:site\` has replaced placeholders. Skipping validate:launch."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.state.outputs.skip != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install
        if: steps.state.outputs.skip != 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        if: steps.state.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Set production overrides (if configured by project)
        if: steps.state.outputs.skip != 'true'
        run: |
          if [ -n "${{ vars.PRODUCTION_ORIGIN }}" ]; then
            echo "ORIGIN=${{ vars.PRODUCTION_ORIGIN }}" >> "$GITHUB_ENV"
            echo "PUBLIC_SITE_URL=${{ vars.PRODUCTION_ORIGIN }}" >> "$GITHUB_ENV"
          fi

      - name: Fill remaining launch env from canonical stubs
        if: steps.state.outputs.skip != 'true'
        run: bun run scripts/print-launch-test-env.ts >> "$GITHUB_ENV"

      - name: Run validate:launch
        if: steps.state.outputs.skip != 'true'
        run: bun run validate:launch
